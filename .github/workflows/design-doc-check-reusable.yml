name: Design Doc Check (reusable)

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
    secrets:
      AZURE_OPENAI_API_KEY:
        required: true
      DESIGN_DOC_GH_TOKEN:
        required: true

jobs:
  design-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DESIGN_DOC_GH_TOKEN }}
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD | head -c 81920 > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Fetch design doc script
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/skarumbu/my-website/main/.github/scripts/design_doc_check.py" \
            -o /tmp/design_doc_check.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      - name: Run design doc check
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.DESIGN_DOC_GH_TOKEN }}
          PR_DIFF_FILE: /tmp/pr.diff
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ inputs.repo_name }}
          REPO_FULL: ${{ github.repository }}
          BRANCH_NAME: design-doc/pr-${{ github.event.pull_request.number }}
        run: python /tmp/design_doc_check.py
